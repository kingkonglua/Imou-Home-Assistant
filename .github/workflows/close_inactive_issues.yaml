# 按评论时间线：若**最后一条评论**来自维护者，且超过 STALE_AFTER_DAYS 天 → 打 stale 标签；
# 超过 INACTIVE_DAYS 天 → 评论并关闭。若最后一条来自非维护者，则移除 stale（表示已有新回复）。
# 带标签 no-auto-close 或 enhancement 的 Issue 整单跳过（不打 stale、不关）。
# 请在仓库 Labels 中预先创建与 STALE_LABEL 同名的标签（默认 stale）。
name: Close inactive issues after maintainer reply

on:
  schedule:
    - cron: "42 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: close-inactive-issues
  cancel-in-progress: false

jobs:
  close-stale:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Stale label then close when last comment is maintainer-only thread
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAINTAINERS: Imou-OpenPlatform
          STALE_AFTER_DAYS: "21"
          INACTIVE_DAYS: "30"
          STALE_LABEL: stale
          INACTIVE_EXCLUDE_LABELS: no-auto-close,enhancement
        run: python3 .github/scripts/close_inactive_author_issues.py
