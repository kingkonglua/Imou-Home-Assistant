# Build imou_life.zip for HACS (must match hacs.json "filename" when zip_release is true).
# GitHub counts asset downloads; HACS Data can then expose a "downloads" field in the store.
name: Release assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to attach imou_life.zip to (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  imou_life_zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: >-
            ${{ github.event_name == 'release' && github.event.release.tag_name
            || inputs.tag_name }}

      # Flat zip: entries are manifest.json, __init__.py, ... (no imou_life/ prefix). HACS installs into custom_components/imou_life/.
      - name: Create imou_life.zip
        working-directory: ${{ github.workspace }}/custom_components/imou_life
        run: zip -r "${{ github.workspace }}/imou_life.zip" .

      - name: Upload zip to release (from GitHub release event)
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "${{ github.event.release.tag_name }}"
          imou_life.zip
          --repo "${{ github.repository }}"
          --clobber

      - name: Upload zip to release (manual workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "${{ inputs.tag_name }}"
          imou_life.zip
          --repo "${{ github.repository }}"
          --clobber
